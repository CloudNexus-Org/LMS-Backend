server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/lms_auth
    username: ${POSTGRES_USER:lms_admin}
    password: ${POSTGRES_PASSWORD:lms_secret}
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  access-expiry: ${JWT_ACCESS_EXPIRY:15m}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:7d}

management:
  endpoints:
    web:
      exposure:
        include: health,info
