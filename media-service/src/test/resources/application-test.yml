spring:
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientConfiguration
  cloud:
    client:
      hostname: localhost
  datasource:
    url: jdbc:h2:mem:media_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

media:
  storage:
    root: ./target/test-uploads
    base-url: http://localhost:8095/api/media/files

eureka:
  client:
    enabled: false
